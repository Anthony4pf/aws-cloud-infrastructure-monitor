name: Cloud Infrastructure Monitor

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour on the hour
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write instance ID from secret
        run: echo "${{ secrets.INSTANCE_ID }}" > .instance_id

      - name: Run monitor (single poll cycle)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DB_PATH: metrics.db
        run: python -c "from src.monitor import run_monitor; run_monitor(poll_once=True)"

      - name: Upload metrics database as artifact
        uses: actions/upload-artifact@v3
        with:
          name: metrics-db
          path: metrics.db
          retention-days: 7
